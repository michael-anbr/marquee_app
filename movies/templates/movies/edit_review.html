<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131313] text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-[#1c1b1b] rounded-xl p-6 border border-zinc-800 shadow-2xl">
        <h2 class="text-[#f5c518] text-xl font-bold mb-4 font-['Chivo']">Edit Your Review</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.content }}
            <div class="flex gap-3 mt-4">
                <button type="submit" class="bg-[#f5c518] text-black font-bold px-4 py-2 rounded hover:bg-[#dfb311] transition-colors">
                    Save Changes
                </button>
                <a href="{% url 'movies:movie_detail' review.movie.id %}" class="bg-zinc-800 text-white px-4 py-2 rounded hover:bg-zinc-700 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
