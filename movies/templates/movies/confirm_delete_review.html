<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131313] text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-[#1c1b1b] rounded-xl p-6 border border-zinc-800 shadow-2xl text-center">
        <h2 class="text-red-400 text-xl font-bold mb-4">Delete Review?</h2>
        <p class="text-zinc-400 text-sm mb-6">Are you sure you want to permanently delete this review? This action cannot be undone.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-center gap-4">
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold px-5 py-2 rounded transition-colors">
                    Yes, Delete
                </button>
                <a href="{% url 'movies:movie_detail' review.movie.id %}" class="bg-zinc-800 text-white px-5 py-2 rounded hover:bg-zinc-700 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
