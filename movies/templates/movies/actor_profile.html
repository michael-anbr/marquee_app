{% extends 'marquee_app/index.html' %} {% block carousel %} {% endblock %} {%
{% block content %}
<div
  class="w-full flex justify-center pt-8 px-4 font-['Hanken_Grotesk'] text-white"
>
  <div
    class="w-full max-w-2xl bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-6 md:p-10 flex flex-col items-center text-center shadow-xl"
  >
    <div class="mb-6 block">
      {% if actor.photo %}
      <img
        src="{{ actor.photo.url }}"
        alt="{{ actor.name }}"
        class="rounded-lg shadow-md max-w-full max-h-[400px] w-auto h-auto object-contain border border-zinc-800 mx-auto"
      />
      {% else %}
      <div
        class="w-24 h-24 rounded-full bg-zinc-800 text-zinc-400 flex items-center justify-center border border-zinc-700 mx-auto"
      >
        <span class="material-symbols-outlined text-4xl">person</span>
      </div>
      {% endif %}
    </div>

    <h1
      class="text-4xl font-extrabold text-[#f5c518] mb-2 font-['Chivo'] tracking-wide"
    >
      {{ actor.name }}
    </h1>

    {% if actor.role %}
    <div class="mb-6">
      <span
        class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest bg-zinc-950 border border-zinc-800 px-3 py-1 rounded-md"
      >
        {{ actor.role }}
      </span>
    </div>
    {% endif %}

    <div class="border-t border-zinc-800/80 w-full pt-6 text-left">
      <h2
        class="text-xl font-bold mb-4 text-zinc-400 tracking-wide text-center uppercase font-['Chivo']"
      >
        Biography
      </h2>
      <p
        class="text-zinc-300 leading-relaxed text-base text-justify whitespace-pre-line"
      >
        {{ actor.bio|safe }}
      </p>
    </div>
  </div>
</div>

<style>
  .profile-subtitle {
    color: #ffffff;
    font-family: "Chivo", sans-serif;
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 1.75rem;
    margin-bottom: 0.5rem;
    border-bottom: 2px solid #3f3f46;
    padding-bottom: 0.25rem;
    display: block;
  }
</style>
{% endblock %}
