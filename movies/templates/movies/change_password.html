<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marquee | Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131313] text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-[#1c1b1b] rounded-xl p-6 border border-zinc-800 shadow-2xl">
        <h2 class="text-[#f5c518] text-xl font-bold mb-4 font-['Chivo']">Change Password</h2>
        
        <form method="POST" class="flex flex-col gap-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-xs uppercase text-zinc-500 font-bold mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}

            {% if form.non_field_errors %}
                <p class="text-red-400 text-xs bg-red-950/20 border border-red-900/50 p-2 rounded">{{ form.non_field_errors.0 }}</p>
            {% endif %}

            <div class="flex gap-3 mt-2">
                <button type="submit" class="bg-[#f5c518] text-black font-bold px-4 py-2 rounded hover:bg-[#dfb311] transition-colors text-sm">
                    Update Password
                </button>
                <a href="{% url 'movies:user_profile' %}" class="bg-zinc-800 text-white px-4 py-2 rounded hover:bg-zinc-700 transition-colors text-sm flex items-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
