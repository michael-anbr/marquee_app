<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Marquee | Change Username</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-[#131313] text-white min-h-screen flex items-center justify-center p-6"
  >
    <div
      class="max-w-md w-full bg-[#1c1b1b] rounded-xl p-6 border border-zinc-800 shadow-2xl"
    >
      <h2 class="text-[#f5c518] text-xl font-bold mb-4 font-['Chivo']">
        Update Username
      </h2>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          {{ form.username }} {% if form.username.errors %}
          <p class="text-red-400 text-xs mt-1">{{ form.username.errors.0 }}</p>
          {% endif %}
        </div>
        <div class="flex gap-3">
          <button
            type="submit"
            class="bg-[#f5c518] text-black font-bold px-4 py-2 rounded hover:bg-[#dfb311] transition-colors text-sm"
          >
            Save Username
          </button>
          <a
            href="{% url 'movies:profile' %}"
            class="bg-zinc-800 text-white px-4 py-2 rounded hover:bg-zinc-700 transition-colors text-sm flex items-center"
          >
            Cancel
          </a>
        </div>
      </form>
    </div>
  </body>
</html>
